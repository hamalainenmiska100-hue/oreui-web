name: Move oreui-main to root (final)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean repo (keep folder + workflow)
        run: |
          shopt -s extglob
          rm -rf !(oreui-main|.github)

      - name: Move everything except .github
        run: |
          shopt -s dotglob

          for item in oreui-main/*; do
            name=$(basename "$item")

            if [ "$name" != ".github" ]; then
              mv "$item" .
            fi
          done

      - name: Force move hidden files safely
        run: |
          shopt -s dotglob

          for item in oreui-main/.*; do
            name=$(basename "$item")

            if [ "$name" != "." ] && [ "$name" != ".." ] && [ "$name" != ".github" ]; then
              mv "$item" .
            fi
          done

      - name: Cleanup EVERYTHING
        run: |
          rm -rf oreui-main
          rm -rf .github

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "FINAL: move to root + self destruct" || echo "No changes"
          git push
